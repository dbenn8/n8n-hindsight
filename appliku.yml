build_settings:
  build_image: "dockerfile"
  container_port: 8888
  expose_web_port: true
  environment_variables:
    - name: HINDSIGHT_API_DATABASE_URL
      from_database:
        name: db
        property: private_connection_url
    - name: HINDSIGHT_API_HOST
      value: "0.0.0.0"
    - name: HINDSIGHT_API_PORT
      value: "8889"
    # LLM for consolidation — Claude Haiku via the personal instance's Hermes proxy
    # (hindsight_web:8643 on the shared `applications` Docker network). API key =
    # that proxy's API_SERVER_KEY, set as a dashboard secret (repo is public).
    - name: HINDSIGHT_API_LLM_PROVIDER
      value: "openai"
    - name: HINDSIGHT_API_LLM_BASE_URL
      value: "http://hindsight_web:8643/v1"
    - name: HINDSIGHT_API_LLM_MODEL
      value: "consolidator"
    - name: HINDSIGHT_API_LLM_API_KEY
      source: manual
    # Consolidation workers — increase to process 68K backlog faster
    - name: HINDSIGHT_API_WORKER_CONSOLIDATION_MAX_SLOTS
      value: "6"
    - name: HINDSIGHT_API_CONSOLIDATION_MAX_MEMORIES_PER_ROUND
      value: "5000"
    - name: HINDSIGHT_API_CONSOLIDATION_BATCH_SIZE
      value: "100"
    # Embeddings: local in-container model (no external API)
    - name: HINDSIGHT_API_EMBEDDINGS_PROVIDER
      value: "local"
    - name: HINDSIGHT_API_RERANKER_PROVIDER
      value: "rrf"
    - name: HINDSIGHT_API_VECTOR_EXTENSION
      value: "pgvector"
    - name: HINDSIGHT_API_RETAIN_MAX_COMPLETION_TOKENS
      value: "4096"
    - name: HINDSIGHT_API_CONSOLIDATION_LLM_BATCH_SIZE
      value: "25"
    - name: HINDSIGHT_API_WORKER_ID
      value: "n8nhindsight-worker-1"
    - name: HINDSIGHT_API_MCP_ENABLED
      value: "true"
    # Restrict MCP to recall only — public read-only instance
    - name: HINDSIGHT_API_MCP_ENABLED_TOOLS
      value: "recall,list_banks,get_bank,get_bank_stats,list_tags"
    - name: HINDSIGHT_API_TENANT_EXTENSION
      value: "hindsight_api.extensions.builtin.tenant:ApiKeyTenantExtension"
    - name: HINDSIGHT_API_TENANT_API_KEY
      source: manual
    - name: HINDSIGHT_CP_DATAPLANE_API_URL
      value: "http://127.0.0.1:8889"
    - name: HINDSIGHT_CP_DATAPLANE_API_KEY
      value: "${HINDSIGHT_API_TENANT_API_KEY}"
    - name: HINDSIGHT_CP_ACCESS_KEY
      source: manual
    # GitHub sync cronjob
    - name: GITHUB_TOKEN
      source: manual
    - name: HINDSIGHT_URL
      value: "http://n8nhindsight_web:8888"
    - name: SYNC_STATE_FILE
      value: "/data/sync-state.json"

databases:
  db:
    type: postgresql_16_pgvector

services:
  web:
    command: "supervisord -c /etc/supervisord.conf"

cronjobs:
  github-sync:
    command: "python3 /app/scripts/sync-github.py"
    schedule: "0 3 * * *"
  docs-sync:
    command: "python3 /app/scripts/sync-docs.py"
    schedule: "30 3 * * *"
  community-sync:
    command: "python3 /app/scripts/sync-community.py"
    schedule: "0 4 * * *"
  releases-sync:
    command: "python3 /app/scripts/sync-releases.py"
    schedule: "30 4 * * *"

volumes:
  sync-data:
    target: "/data"
