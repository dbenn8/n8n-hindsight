worker_processes 1;
pid /run/nginx.pid;
error_log /dev/stderr warn;

events {
    worker_connections 256;
}

http {
    access_log /dev/stdout;

    upstream api {
        server 127.0.0.1:8889;
    }

    upstream controlplane {
        server 127.0.0.1:9999;
    }

    upstream opsproxy {
        server 127.0.0.1:8001;
    }

    server {
        listen 8888;

        # MCP endpoint — SSE streaming, no buffering
        location /mcp {
            proxy_pass http://api;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header Connection '';
            proxy_buffering off;
            proxy_cache off;
            chunked_transfer_encoding off;
        }

        # Public recall — no auth required, key injected server-side
        location = /public/recall {
            if ($request_method != POST) {
                return 405;
            }

            proxy_pass http://api/v1/default/banks/n8n/memories/recall;
            proxy_set_header Host $host;
            proxy_set_header Authorization "Bearer ${HINDSIGHT_API_TENANT_API_KEY}";
            proxy_set_header Content-Type "application/json";
        }

        # Public stats — no auth required, key injected server-side
        location = /public/stats {
            add_header Access-Control-Allow-Origin "*" always;
            add_header Access-Control-Allow-Methods "GET, OPTIONS" always;

            if ($request_method = OPTIONS) {
                return 204;
            }
            if ($request_method != GET) {
                return 405;
            }

            proxy_pass http://api/v1/default/banks/n8n/stats;
            proxy_set_header Host $host;
            proxy_set_header Authorization "Bearer ${HINDSIGHT_API_TENANT_API_KEY}";
        }

        # Public workflow validation — handled by ops-proxy
        location = /public/validate-workflow {
            add_header Access-Control-Allow-Origin "*" always;
            add_header Access-Control-Allow-Methods "POST, OPTIONS" always;
            add_header Access-Control-Allow-Headers "Content-Type" always;

            if ($request_method = OPTIONS) {
                return 204;
            }
            if ($request_method != POST) {
                return 405;
            }

            proxy_pass http://opsproxy/public/validate-workflow;
            proxy_set_header Host $host;
        }

        # Public validator health + version metadata — handled by ops-proxy
        location = /public/validator-health {
            add_header Access-Control-Allow-Origin "*" always;
            add_header Access-Control-Allow-Methods "GET, OPTIONS" always;

            if ($request_method = OPTIONS) {
                return 204;
            }
            if ($request_method != GET) {
                return 405;
            }

            proxy_pass http://opsproxy/public/validator-health;
            proxy_set_header Host $host;
        }

        # All API routes → Hindsight API
        location /v1/ {
            proxy_pass http://api;
            proxy_set_header Host $host;
        }

        location /health {
            proxy_pass http://api;
        }

        location /version {
            proxy_pass http://api;
        }

        location /metrics {
            proxy_pass http://api;
        }

        location /docs {
            proxy_pass http://api;
        }

        location /openapi.json {
            proxy_pass http://api;
        }

        # Admin-gated durable log retrieval → ops-proxy
        location /logs {
            proxy_pass http://opsproxy;
            proxy_set_header Host $host;
        }

        # Everything else → Control Plane UI
        location / {
            proxy_pass http://controlplane;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
        }
    }
}
